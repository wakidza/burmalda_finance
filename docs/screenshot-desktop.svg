<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <style>
      .label{fill:#64748b;font-size:12px;letter-spacing:.04em;}
      .val{font-size:26px;font-weight:700;}
      .h2{fill:#0f172a;font-size:16px;font-weight:700;}
      .row{fill:#0f172a;font-size:13px;}
      .muted{fill:#64748b;font-size:11px;}
      .card{fill:#ffffff;rx:12;}
    </style>
  </defs>

  <rect width="900" height="540" fill="#f1f5f9"/>

  <!-- Topbar -->
  <rect width="900" height="58" fill="url(#bar)"/>
  <text x="24" y="36" fill="#ffffff" font-size="20" font-weight="700">💰 Бурмалда Finance</text>
  <rect x="640" y="16" width="70" height="26" rx="6" fill="#ffffff"/>
  <text x="652" y="33" fill="#0f172a" font-size="12">2026 ▾</text>
  <rect x="720" y="16" width="80" height="26" rx="6" fill="#ffffff"/>
  <text x="732" y="33" fill="#0f172a" font-size="12">июнь ▾</text>
  <rect x="810" y="16" width="74" height="26" rx="6" fill="none" stroke="#ffffff" stroke-opacity=".5"/>
  <text x="820" y="33" fill="#ffffff" font-size="11">Swagger</text>

  <!-- Summary cards -->
  <g>
    <rect x="24" y="80" width="276" height="86" rx="12" fill="#ffffff"/>
    <rect x="24" y="80" width="5" height="86" rx="2" fill="#16a34a"/>
    <text x="44" y="108" class="label">ДОХОДЫ</text>
    <text x="44" y="142" class="val" fill="#16a34a">40 575,27 ₽</text>

    <rect x="312" y="80" width="276" height="86" rx="12" fill="#ffffff"/>
    <rect x="312" y="80" width="5" height="86" rx="2" fill="#dc2626"/>
    <text x="332" y="108" class="label">РАСХОДЫ</text>
    <text x="332" y="142" class="val" fill="#dc2626">42 286,21 ₽</text>

    <rect x="600" y="80" width="276" height="86" rx="12" fill="#ffffff"/>
    <rect x="600" y="80" width="5" height="86" rx="2" fill="#2563eb"/>
    <text x="620" y="108" class="label">БАЛАНС</text>
    <text x="620" y="142" class="val" fill="#2563eb">−1 710,94 ₽</text>
  </g>

  <!-- Left: new operation form -->
  <rect x="24" y="184" width="400" height="332" rx="12" fill="#ffffff"/>
  <text x="44" y="214" class="h2">Новая операция</text>
  <text x="44" y="244" class="muted">Тип</text>
  <rect x="44" y="252" width="170" height="34" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="56" y="274" class="row">Расход ▾</text>
  <text x="234" y="244" class="muted">Сумма</text>
  <rect x="234" y="252" width="166" height="34" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="246" y="274" fill="#94a3b8" font-size="13">0.00</text>
  <text x="44" y="312" class="muted">Категория</text>
  <rect x="44" y="320" width="170" height="34" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="56" y="342" class="row">Продукты ▾</text>
  <text x="234" y="312" class="muted">Дата</text>
  <rect x="234" y="320" width="166" height="34" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="246" y="342" class="row">13.06.2026</text>
  <text x="44" y="380" class="muted">Комментарий</text>
  <rect x="44" y="388" width="356" height="34" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <rect x="44" y="436" width="356" height="40" rx="9" fill="#2563eb"/>
  <text x="160" y="461" fill="#ffffff" font-size="14" font-weight="600">Добавить операцию</text>

  <!-- Right: budgets -->
  <rect x="440" y="184" width="436" height="332" rx="12" fill="#ffffff"/>
  <text x="460" y="214" class="h2">Бюджеты месяца</text>
  <text x="460" y="234" class="muted">Контроль лимитов расходов за выбранный месяц.</text>

  <!-- Продукты 0% -->
  <text x="460" y="266" class="row">Продукты</text>
  <text x="856" y="266" class="row" text-anchor="end">0,00 ₽ / 30 000,00 ₽</text>
  <rect x="460" y="274" width="396" height="8" rx="4" fill="#eef2f7"/>
  <rect x="460" y="274" width="2" height="8" rx="4" fill="#16a34a"/>
  <text x="460" y="298" class="muted">осталось 30 000,00 ₽ · 0%</text>

  <!-- Транспорт 195% over -->
  <text x="460" y="328" class="row">Транспорт</text>
  <text x="856" y="328" class="row" text-anchor="end">15 597,73 ₽ / 8 000,00 ₽</text>
  <rect x="460" y="336" width="396" height="8" rx="4" fill="#eef2f7"/>
  <rect x="460" y="336" width="396" height="8" rx="4" fill="#dc2626"/>
  <text x="460" y="360" class="muted">превышен на 7 597,73 ₽ · 195%</text>

  <!-- Развлечения 55% -->
  <text x="460" y="390" class="row">Развлечения</text>
  <text x="856" y="390" class="row" text-anchor="end">5 508,17 ₽ / 10 000,00 ₽</text>
  <rect x="460" y="398" width="396" height="8" rx="4" fill="#eef2f7"/>
  <rect x="460" y="398" width="218" height="8" rx="4" fill="#16a34a"/>
  <text x="460" y="422" class="muted">осталось 4 491,83 ₽ · 55.1%</text>

  <!-- Кафе 103% over -->
  <text x="460" y="452" class="row">Кафе и рестораны</text>
  <text x="856" y="452" class="row" text-anchor="end">12 410,00 ₽ / 12 000,00 ₽</text>
  <rect x="460" y="460" width="396" height="8" rx="4" fill="#eef2f7"/>
  <rect x="460" y="460" width="396" height="8" rx="4" fill="#dc2626"/>
  <text x="460" y="484" class="muted">превышен на 410,00 ₽ · 103.4%</text>
</svg>
